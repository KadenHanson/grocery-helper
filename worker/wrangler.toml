name = "grocery-helper-sync"
main = "worker.js"
compatibility_date = "2026-07-01"

# D1 binding. Fill database_id with the value printed by:
#   npx wrangler d1 create grocery-helper
[[d1_databases]]
binding = "DB"
database_name = "grocery-helper"
database_id = "REPLACE_WITH_ID_FROM_wrangler_d1_create"
